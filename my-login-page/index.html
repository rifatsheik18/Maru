<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login & Save Data</title>

  <style>
    body {
      background: black;
      color: white;
      display: flex;
      flex-direction: column; /* এলিমেন্টগুলো নিচে নিচে রাখার জন্য */
      justify-content: center;
      align-items: center;
      height: 100vh;
      font-family: Arial, sans-serif;
      margin: 0;
    }

    .box {
      width: 300px;
      padding: 20px;
      border: 1px solid #333;
      border-radius: 8px;
    }

    /* input এবং button এর সাইজ ঠিক রাখার জন্য box-sizing ব্যবহার করা হয়েছে */
    input, button {
      width: 100%; 
      box-sizing: border-box; 
      padding: 12px;
      margin: 10px 0;
      border-radius: 4px;
      border: none;
    }

    input {
      background: #222;
      color: white;
    }

    button {
      background: #ff0050;
      color: white;
      cursor: pointer;
      font-weight: bold;
    }

    button:hover {
      background: #e60045;
    }

    h2 {
      text-align: center;
    }

    .display-area {
      margin-top: 20px;
      padding: 15px;
      background: #111;
      border: 1px dashed #555;
      width: 300px;
      text-align: center;
    }
  </style>
</head>

<body>

  <div class="box">
    <h2>Login</h2>
    <input type="email" id="email" placeholder="Email">
    <input type="password" id="password" placeholder="Password">
    <button onclick="login()">Login</button>
  </div>

  <div class="display-area" id="resultBox" style="display:none;">
    <h3 style="font-size: 14px; color: #aaa;">Saved Information:</h3>
    <p id="showEmail" style="color: #ff0050;"></p>
    <p id="showPass" style="font-size: 12px; color: #777;"></p>
    <button onclick="clearData()" style="background: #444; margin-top: 10px; font-size: 12px;">Dont Clik hear</button>
  </div>
  

  <script>
    function login() {
      // ইনপুট থেকে ভ্যালু নেওয়া
      const emailValue = document.getElementById('email').value;
      const passValue = document.getElementById('password').value;

      if(emailValue === "" || passValue === "") {
        alert("দয়া করে ইমেইল এবং পাসওয়ার্ড লিখুন!");
        return;
      }

      // ব্রাউজারের Local Storage-এ ডাটা সেভ করা
      localStorage.setItem('userEmail', emailValue);
      localStorage.setItem('userPass', passValue);

      alert("আপনার তথ্য সেভ হয়েছে!");

      // সাথে সাথে ডাটাটি নিচে দেখানোর ফাংশন কল করা
      displaySavedData();
    }

    function displaySavedData() {
      const savedEmail = localStorage.getItem('userEmail');
      const savedPass = localStorage.getItem('userPass');

      if (savedEmail) {
        document.getElementById('resultBox').style.display = "block";
        document.getElementById('showEmail').innerText = "Email: " + savedEmail;
        document.getElementById('showPass').innerText = "Password: " + savedPass;
      }
    }

    // পেজ রিফ্রেশ করলেও যাতে আগের ডাটা দেখা যায় (যদি সেভ থাকে)
    window.onload = displaySavedData;
    function clearData() {
  // মেমোরি থেকে ডাটা মুছে ফেলা
  localStorage.removeItem('userEmail');
  localStorage.removeItem('userPass');
  
  // স্ক্রিন থেকে বক্সটি লুকিয়ে ফেলা
  document.getElementById('resultBox').style.display = "none";
  
  alert("সব ডাটা মুছে ফেলা হয়েছে!");
}
  </script>
  

</body>
</html>
