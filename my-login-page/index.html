<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MARU - Lamp Login Portal</title>
    
    <style>
        :root {
            --bg-dark: #050505;
            --lamp-gold: #f1c40f;
            --glow: rgba(241, 196, 15, 0.4);
            --glass: rgba(255, 255, 255, 0.05);
            --accent: #00d2ff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg-dark);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', sans-serif;
            overflow: hidden;
            transition: background 0.6s ease;
        }

        /* Light ON State */
        body.light-on { background-color: #121225; }

        .container {
            display: flex;
            width: 90%;
            max-width: 1000px;
            justify-content: space-around;
            align-items: center;
            flex-wrap: wrap;
        }

        /* --- Lamp Section --- */
        .lamp-container { position: relative; width: 250px; text-align: center; }

        .lamp-shade {
            width: 140px;
            height: 90px;
            background: #333;
            border-radius: 70px 70px 0 0;
            margin: 0 auto;
            position: relative;
            z-index: 2;
            transition: 0.4s;
        }

        .light-on .lamp-shade {
            background: var(--lamp-gold);
            box-shadow: 0 -10px 60px var(--lamp-gold), 0 10px 40px var(--glow);
        }

        .lamp-stand {
            width: 12px;
            height: 180px;
            background: linear-gradient(to bottom, #444, #222);
            margin: -5px auto;
        }

        .pull-chain {
            position: absolute;
            left: 65%;
            top: 90px;
            cursor: pointer;
            z-index: 10;
        }

        .string { width: 3px; height: 70px; background: #666; margin: 0 auto; }
        .bead { width: 15px; height: 15px; background: #888; border-radius: 50%; margin-top: -5px; }

        /* --- Login Card Section --- */
        .login-card {
            background: var(--glass);
            backdrop-filter: blur(20px);
            padding: 50px 40px;
            border-radius: 25px;
            border: 1px solid rgba(255,255,255,0.1);
            width: 380px;
            color: white;
            text-align: center;
            opacity: 0.1; /* Initially dim */
            transform: scale(0.95);
            transition: all 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .light-on .login-card {
            opacity: 1;
            transform: scale(1);
            box-shadow: 0 0 40px rgba(0, 210, 255, 0.2);
        }

        h1 { font-size: 3rem; color: var(--accent); letter-spacing: 5px; margin-bottom: 10px; }
        p { color: #888; margin-bottom: 30px; font-size: 0.9rem; }

        input {
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px;
            color: white;
            outline: none;
        }

        button {
            width: 100%;
            padding: 15px;
            background: linear-gradient(45deg, var(--accent), #3a7bd5);
            border: none;
            border-radius: 10px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
            text-transform: uppercase;
            transition: 0.3s;
        }

        button:hover { transform: translateY(-3px); box-shadow: 0 5px 15px var(--accent); }

        .footer { margin-top: 20px; font-size: 0.8rem; color: #555; }
        a { color: var(--accent); text-decoration: none; margin: 0 10px; }
    </style>
</head>
<body>

    <div class="container">
        <div class="lamp-container">
            <div class="lamp-shade"></div>
            <div class="lamp-stand"></div>
            <div class="pull-chain" id="chain">
                <div class="string"></div>
                <div class="bead"></div>
            </div>
        </div>

        <div class="login-card">
            <h1>LOGIN</h1>
            <p>MARUFA I Love You </p>
            <input type="text" id="username" placeholder="Enter Username">
            <input type="password" id="password" placeholder="Enter Password">
            <button id="loginBtn">Initialize Session</button>
            <div class="footer">
                <a href="#">Forgot?</a> | <a href="#">Create Account</a>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

    <script>
        const chain = document.getElementById('chain');
        const body = document.body;
        let isLightOn = false;

        // 1. Lamp Pull Logic
        chain.addEventListener('click', () => {
            // Chain pull animation
            gsap.to(chain, { y: 25, duration: 0.1, yoyo: true, repeat: 1 });

            // Toggle state
            isLightOn = !isLightOn;

            if (isLightOn) {
                body.classList.add('light-on');
            } else {
                body.classList.remove('light-on');
            }
        });

        // 2. Real-time Feedback Animation
        // When typing, the lamp flickers slightly (Cool effect!)
        const inputs = document.querySelectorAll('input');
        inputs.forEach(input => {
            input.addEventListener('input', () => {
                if(isLightOn) {
                    gsap.to('.lamp-shade', { opacity: 0.8, duration: 0.05, yoyo: true, repeat: 1 });
                }
            });
        });

        // --- 3. YOUR FIREBASE CODE START ---
        // আপনার পুরনো Firebase Configuration এবং Database Listener এখানে পেস্ট করুন

        /* var firebaseConfig = { ... };
        firebase.initializeApp(firebaseConfig);
        // etc...
        */

    </script>
</body>
</html>
